name: Build TALON Desktop Windows

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,desktop]"

      - name: Verify desktop dependency split
        shell: pwsh
        run: |
          python -c "import importlib.util; assert importlib.util.find_spec('PySide6') is not None; assert importlib.util.find_spec('kivy') is None; assert importlib.util.find_spec('kivymd') is None"

      - name: Run tests
        shell: pwsh
        timeout-minutes: 30
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -vv -ra --tb=short --durations=25 -o faulthandler_timeout=120 -o faulthandler_exit_on_timeout=true

      - name: Build PySide6 Windows package
        shell: pwsh
        env:
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}\.pyinstaller
        run: pyinstaller --clean --noconfirm build/pyinstaller-windows.spec

      - name: Verify PySide6 bundle contents
        shell: pwsh
        run: |
          if (!(Test-Path dist\talon-desktop-windows\talon-desktop.exe)) { throw "Missing talon-desktop.exe" }
          if (!(Test-Path dist\talon-desktop-windows\_internal\base_library.zip)) { throw "Missing base_library.zip" }
          if (Test-Path dist\talon-desktop-windows\_internal\kivy) { throw "Unexpected Kivy bundle" }
          if (Test-Path dist\talon-desktop-windows\_internal\kivymd) { throw "Unexpected KivyMD bundle" }

      - name: Smoke test PySide6 artifact
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          & .\dist\talon-desktop-windows\talon-desktop.exe --smoke --mode server
          & .\dist\talon-desktop-windows\talon-desktop.exe --smoke --mode client

      - name: Download bundled Windows runtimes
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\build\windows\download-runtime.ps1

      - name: Verify bundled Windows runtimes
        shell: pwsh
        run: |
          if (!(Test-Path dist\windows-runtime\installers\yggdrasil.msi)) { throw "Missing Yggdrasil MSI" }
          if (!(Test-Path dist\windows-runtime\i2pd\i2pd.exe)) { throw "Missing i2pd.exe" }
          Get-Content dist\windows-runtime\runtime-versions.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows setup executables
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          $appVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          Push-Location build
          & $iscc /DArtifactRole=client /DAppVersion="$appVersion" talon-desktop-windows.iss
          & $iscc /DArtifactRole=server /DAppVersion="$appVersion" talon-desktop-windows.iss
          Pop-Location

      - name: Verify Windows setup executables
        shell: pwsh
        run: |
          if (!(Test-Path dist\talon-desktop-client-windows-setup.exe)) { throw "Missing client setup" }
          if (!(Test-Path dist\talon-desktop-server-windows-setup.exe)) { throw "Missing server setup" }
          Get-FileHash dist\talon-desktop-client-windows-setup.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  talon-desktop-client-windows-setup.exe" } |
            Set-Content dist\talon-desktop-client-windows-setup.exe.sha256
          Get-FileHash dist\talon-desktop-server-windows-setup.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  talon-desktop-server-windows-setup.exe" } |
            Set-Content dist\talon-desktop-server-windows-setup.exe.sha256

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talon-desktop-windows
          path: |
            dist/talon-desktop-client-windows-setup.exe
            dist/talon-desktop-client-windows-setup.exe.sha256
            dist/talon-desktop-server-windows-setup.exe
            dist/talon-desktop-server-windows-setup.exe.sha256
