name: Build TALON Desktop Linux

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsqlcipher-dev \
            libmagic1 \
            libgl1 \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libx11-xcb1 \
            xauth \
            xvfb

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,desktop]"

      - name: Verify desktop dependency split
        run: |
          python - <<'PY'
          import importlib.util
          assert importlib.util.find_spec("PySide6") is not None
          assert importlib.util.find_spec("kivy") is None
          assert importlib.util.find_spec("kivymd") is None
          PY

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

      - name: Build PySide6 Linux package
        env:
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/.pyinstaller
        run: pyinstaller --clean --noconfirm build/pyinstaller-linux-desktop.spec

      - name: Verify PySide6 bundle contents
        run: |
          test -x dist/talon-desktop-linux/talon-desktop
          test -f dist/talon-desktop-linux/_internal/base_library.zip
          test ! -d dist/talon-desktop-linux/_internal/kivy
          test ! -d dist/talon-desktop-linux/_internal/kivymd

      - name: Smoke test PySide6 artifact
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          dist/talon-desktop-linux/talon-desktop --smoke --mode server
          dist/talon-desktop-linux/talon-desktop --smoke --mode client

      - name: Reticulum loopback smoke PySide6 artifact
        run: dist/talon-desktop-linux/talon-desktop --loopback-smoke

      - name: Validate installer script
        run: bash -n build/install-talon-desktop.sh

      - name: Package Linux release tarballs
        run: |
          for role in client server; do
            role_dir="dist/talon-desktop-${role}-linux"
            rm -rf "$role_dir"
            cp -a dist/talon-desktop-linux "$role_dir"
            printf '%s\n' "$role" > "$role_dir/.talon-artifact-role"
            cp build/install-talon-desktop.sh "$role_dir/install.sh"
            chmod +x "$role_dir/install.sh"
            tar -C dist -czf "dist/talon-desktop-${role}-linux.tar.gz" "talon-desktop-${role}-linux"
            sha256sum "dist/talon-desktop-${role}-linux.tar.gz" > "dist/talon-desktop-${role}-linux.tar.gz.sha256"
          done

      - name: Smoke install Linux release artifacts
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          for role in client server; do
            release_dir="$RUNNER_TEMP/talon-desktop-${role}-release"
            mkdir -p "$release_dir"
            cp "dist/talon-desktop-${role}-linux.tar.gz" "$release_dir/talon-desktop-${role}-linux.tar.gz"
            tar -C "$release_dir" -xzf "$release_dir/talon-desktop-${role}-linux.tar.gz"
            (
              cd "$release_dir/talon-desktop-${role}-linux"
              HOME="$RUNNER_TEMP/home-${role}" \
              XDG_DATA_HOME="$RUNNER_TEMP/xdg-data-${role}" \
              XDG_STATE_HOME="$RUNNER_TEMP/xdg-state-${role}" \
              ./install.sh --no-deps --no-bin --no-desktop --smoke-test \
                --prefix "$RUNNER_TEMP/talon-desktop-${role}-install" \
                --config "$RUNNER_TEMP/talon-desktop-${role}-config/talon.ini" \
                --data-dir "$RUNNER_TEMP/talon-desktop-${role}-data"
            )
            test -x "$RUNNER_TEMP/talon-desktop-${role}-install/talon-desktop-${role}-linux/talon-desktop"
            test -f "$RUNNER_TEMP/talon-desktop-${role}-install/talon-desktop-${role}-linux/.talon-artifact-role"
            test ! -d "$RUNNER_TEMP/talon-desktop-${role}-install/talon-desktop-${role}-linux/_internal/kivy"
            test ! -d "$RUNNER_TEMP/talon-desktop-${role}-install/talon-desktop-${role}-linux/_internal/kivymd"
          done

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: talon-desktop-linux
          path: |
            dist/talon-desktop-client-linux.tar.gz
            dist/talon-desktop-client-linux.tar.gz.sha256
            dist/talon-desktop-server-linux.tar.gz
            dist/talon-desktop-server-linux.tar.gz.sha256
