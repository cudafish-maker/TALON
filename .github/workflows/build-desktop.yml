name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            spec: build/pyinstaller-linux.spec
            artifact: talon-linux
          - os: windows-latest
            spec: build/pyinstaller-windows.spec
            artifact: talon-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsqlcipher-dev libgl1-mesa-dev libmagic1 xauth xclip xvfb

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install "kivymd @ https://github.com/kivymd/KivyMD/archive/master.zip#sha256=c09db9f44a04e241b56c7cef8c961bb00ee036c5ae92d57df65f89592af5843f"
          pip install -e ".[dev,desktop]"

      - name: Run pytest
        env:
          KIVY_HOME: ${{ runner.temp }}/.kivy-pytest
        run: pytest -q

      - name: Build Linux with PyInstaller
        if: runner.os == 'Linux'
        env:
          KIVY_HOME: ${{ runner.temp }}/.kivy-build
          KIVY_NO_FILELOG: "1"
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/.pyinstaller
          SDL_AUDIODRIVER: dummy
        run: xvfb-run -a pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Build Windows with PyInstaller
        if: runner.os == 'Windows'
        env:
          KIVY_HOME: ${{ runner.temp }}/.kivy-build
          KIVY_NO_FILELOG: "1"
          PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/.pyinstaller
        run: pyinstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Verify Linux bundle contents
        if: runner.os == 'Linux'
        run: |
          test -x dist/talon-linux/talon
          test -f dist/talon-linux/_internal/base_library.zip
          test -f dist/talon-linux/_internal/kivy/data/style.kv
          test -f dist/talon-linux/_internal/kivymd/icon_definitions.py

      - name: Validate Linux installer script
        if: runner.os == 'Linux'
        run: bash -n build/install-talon.sh

      - name: Smoke test Linux artifact
        if: runner.os == 'Linux'
        env:
          KIVY_HOME: ${{ runner.temp }}/.kivy-smoke
          SDL_AUDIODRIVER: dummy
          TALON_CONFIG: build/talon-smoke-client.ini
          TALON_SMOKE_TEST_SECONDS: "2"
        run: timeout 30s xvfb-run -a dist/talon-linux/talon

      - name: Package Linux release tarball
        if: runner.os == 'Linux'
        run: |
          cp build/install-talon.sh dist/install-talon.sh
          chmod +x dist/install-talon.sh
          tar -C dist -czf dist/talon-linux.tar.gz talon-linux
          sha256sum dist/talon-linux.tar.gz > dist/talon-linux.tar.gz.sha256

      - name: Smoke install Linux release artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p "$RUNNER_TEMP/talon-artifact-wrapper"
          cp dist/talon-linux.tar.gz "$RUNNER_TEMP/talon-artifact-wrapper/talon v0.1.0 linux.tar.gz"
          cp dist/install-talon.sh "$RUNNER_TEMP/talon-artifact-wrapper/install-talon.sh"
          chmod +x "$RUNNER_TEMP/talon-artifact-wrapper/install-talon.sh"
          (
            cd "$RUNNER_TEMP/talon-artifact-wrapper"
            ./install-talon.sh --no-deps --no-bin --no-desktop \
              --prefix "$RUNNER_TEMP/talon-install" \
              --config "$RUNNER_TEMP/talon-config/talon.ini" \
              --data-dir "$RUNNER_TEMP/talon-data"
          )
          test -x "$RUNNER_TEMP/talon-install/talon-linux/talon"
          test -f "$RUNNER_TEMP/talon-install/talon-linux/_internal/kivy/data/style.kv"
          test -f "$RUNNER_TEMP/talon-install/talon-linux/_internal/kivymd/icon_definitions.py"

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: talon-linux
          path: |
            dist/talon-linux.tar.gz
            dist/talon-linux.tar.gz.sha256
            dist/install-talon.sh

      - name: Publish Linux release assets
        if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/talon-linux.tar.gz
            dist/talon-linux.tar.gz.sha256
            dist/install-talon.sh

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: talon-windows
          path: dist/${{ matrix.artifact }}/
