# server.yaml
# Server-specific configuration. Overrides values from default.yaml.
# This file is used only when running talon-server.

# Reticulum node configuration
# The server acts as both a Propagation Node (stores and forwards messages)
# and a Transport Node (routes traffic between clients).
reticulum:
  # Enable propagation node — stores announcements and messages
  # for clients that are temporarily offline
  propagation_node: true
  # Enable transport node — routes traffic between clients
  transport_node: true

# Network interfaces the server listens on.
# Each interface connects to a different network type.
# Reticulum uses these to communicate with clients.
interfaces:
  # Yggdrasil — high-bandwidth encrypted mesh network over the internet.
  # Reticulum runs over Yggdrasil by binding a TCP listener to the
  # server's Yggdrasil IPv6 address.
  yggdrasil:
    enabled: true
    # The server's Yggdrasil IPv6 address.
    # Find this by running: yggdrasilctl getSelf
    # Example: "200:1234:5678:abcd::1"
    # Clients will use this address to connect.
    listen_address: ""
    # Port that Reticulum listens on over Yggdrasil.
    # Clients must use the same port to connect.
    listen_port: 4243
  # I2P — anonymous overlay network (high bandwidth, higher latency).
  # Reticulum connects through I2P tunnels managed by the local
  # I2P router. No IP addresses are exposed.
  i2p:
    enabled: true
    # The I2P router's API address (usually localhost)
    i2p_tunneled: true
    # The I2P base32 address is generated by the I2P router.
    # Share this address with clients so they can find the server.
    # Find this in your I2P router console under the tunnel settings.
    # Example: "abcdefghijklmnop.b32.i2p"
    i2p_address: ""
    # Port for the I2P tunnel
    listen_port: 4244
  # TCP — direct connection over standard internet.
  # *** WARNING: Clients connecting via TCP expose their real IP address. ***
  # *** Only enable if clients are on a trusted network or behind a VPN. ***
  tcp:
    enabled: false
    # The port the server listens on for TCP connections
    listen_port: 4242
    # Bind address — "0.0.0.0" listens on all network interfaces
    bind_address: "0.0.0.0"
  # RNode — LoRa radio (915MHz, very low bandwidth, no internet needed).
  # Communicates via radio waves. No internet connection required.
  # Range depends on antenna, terrain, and the settings below.
  rnode:
    enabled: true
    # Serial port where the RNode hardware is connected
    port: "/dev/ttyUSB0"
    # Frequency in Hz (915MHz band for US)
    frequency: 915000000
    # Bandwidth in Hz — how wide the radio channel is.
    # Higher = faster data but shorter range.
    # Common values: 7800, 10400, 15600, 20800, 31250, 41700,
    #                62500, 125000, 250000, 500000
    # 125000 (125kHz) is a good balance of range and speed.
    bandwidth: 125000
    # Spreading factor — how much the signal is spread across time.
    # Range: 7 to 12. Higher = longer range but slower data.
    # SF7  = fastest, shortest range (~2km)
    # SF10 = good balance (~5-10km)
    # SF12 = slowest, longest range (~15km+)
    spreading_factor: 10
    # Coding rate — adds error correction to the signal.
    # Range: 5 to 8 (represents 4/5 to 4/8 ratio).
    # Higher = more resilient to interference but slower.
    # 5 = minimal error correction, fastest
    # 8 = maximum error correction, slowest
    coding_rate: 5
    # Transmit power in dBm. Higher = more range but more power draw.
    # Max legal power varies by region (US: 30dBm / 1W on 915MHz).
    tx_power: 17

# Server database
# The server stores the authoritative copy of all operational data.
database:
  # Path to the encrypted SQLCipher database file
  path: "data/talon_server.db"

# Audit log
# Records every event that occurs on the server for accountability
# and after-action review. Stored encrypted.
audit:
  # Path to the audit log database
  path: "data/audit.db"
  # How long to keep audit entries before archiving (in days)
  # Set to 0 to keep forever
  retention_days: 0

# Tile cache
# The server downloads and stores map tiles for the Area of Operations,
# then distributes them to clients during sync.
tiles:
  # Where to store downloaded map tiles
  cache_dir: "data/tile_cache"

# Document storage
# Uploaded manuals, maps, and reference documents are stored here.
documents:
  # Where to store uploaded files
  storage_dir: "data/documents"
